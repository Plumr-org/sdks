name: Publish TypeScript SDK

# Triggered by tags shaped `typescript-v*` (e.g. typescript-v0.1.0).
# Builds the package and publishes to npm under @plumr/sdk.
on:
  push:
    tags:
      - "typescript-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#typescript-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json says $PKG_VERSION, tag is $TAG_VERSION — bump package.json before tagging."
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
