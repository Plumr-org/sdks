name: Publish Python SDK

# Triggered by tags shaped `python-v*` (e.g. python-v0.1.0).
# Builds + publishes to PyPI as `plumr` via Trusted Publishing
# (no API key in repo secrets — auth is brokered by GitHub).
on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for PyPI Trusted Publishing
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#python-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "pyproject.toml says $PKG_VERSION, tag is $TAG_VERSION — bump pyproject.toml before tagging."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
